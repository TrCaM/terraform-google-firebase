apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: firebase-firebase-ai-logic-core
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: Firebase AI Logic Core Submodule
    source:
      repo: https://github.com/TrCaM/terraform-google-firebase.git
      sourceType: git
      dir: /modules/firebase_ai_logic_core
    version: 12.31.0
    actuationTool:
      flavor: Terraform
      version: ">= 1.3"
    description: {}
    icon: assets/icon.png
  content:
    examples:
      - name: firebase_ai_logic
        location: examples/firebase_ai_logic
      - name: firebase_auth_suite
        location: examples/firebase_auth_suite
      - name: firebase_multi_platform_app
        location: examples/firebase_multi_platform_app
      - name: firestore_rules
        location: examples/firestore_rules
  interfaces:
    variables:
      - name: project_id
        description: The project ID to deploy to.
        varType: string
        required: true
        connections:
          - source:
              source: github.com/TrCaM/terraform-google-firebase//modules/firebase_multi_platform_application
              version: ">= 12.31.0"
            spec:
              outputExpr: project_id
      - name: location
        description: The location for the AI Logic configuration.
        varType: string
        defaultValue: global
      - name: api_config
        description: Configuration for which AI APIs to enable for Firebase AI Logic.
        varType: |-
          object({
              vertex_ai        = optional(bool, true)
              gemini_developer = optional(bool, false)
            })
        defaultValue: {}
      - name: telemetry_mode
        description: Telemetry mode for AI Logic (e.g., ALL, NONE).
        varType: string
        defaultValue: NONE
      - name: telemetry_sampling_rate
        description: Sampling rate for telemetry.
        varType: number
        defaultValue: 1
    outputs:
      - name: config_name
        description: The name of the AI Logic configuration.
        type: string
      - name: location
        description: The location of the AI Logic configuration.
        type: string
      - name: project_id
        description: The project ID.
        type: string
  requirements:
    roles:
      - level: Project
        roles:
          - roles/owner
    services:
      - apikeys.googleapis.com
      - cloudresourcemanager.googleapis.com
      - firebase.googleapis.com
      - firebaseappcheck.googleapis.com
      - firebasevertexai.googleapis.com
      - identitytoolkit.googleapis.com
      - serviceusage.googleapis.com
    providerVersions:
      - source: hashicorp/google
        version: ">= 5.0, < 8.0"
      - source: hashicorp/google-beta
        version: ">= 7.17.0, < 8.0"
