apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: firebase-firebase-app-hosting
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: Firebase App Hosting Submodule
    source:
      repo: https://github.com/TrCaM/terraform-google-firebase.git
      sourceType: git
      dir: /modules/firebase_app_hosting
    version: 12.37.0
    actuationTool:
      flavor: Terraform
      version: ">= 1.3"
    description: {}
    icon: assets/icon.png
  content:
    examples:
      - name: app_ai_storage
        location: examples/complex_cujs/app_ai_storage
      - name: app_and_appcheck
        location: examples/complex_cujs/app_and_appcheck
      - name: firebase_ai_logic
        location: examples/firebase_ai_logic
      - name: firebase_app_hosting
        location: examples/firebase_app_hosting
      - name: firebase_auth_suite
        location: examples/firebase_auth_suite
      - name: firebase_multi_platform_app
        location: examples/firebase_multi_platform_app
      - name: firestore_rules
        location: examples/firestore_rules
  interfaces:
    variables:
      - name: project_id
        description: The project ID to deploy to
        varType: string
        required: true
      - name: location
        description: The location of the App Hosting backend
        varType: string
        required: true
      - name: backend_id
        description: The ID of the App Hosting backend
        varType: string
        required: true
      - name: web_app_id
        description: The ID of the Firebase Web App to associate with the backend
        varType: string
        required: true
        connections:
          - source:
              source: github.com/TrCaM/terraform-google-firebase//modules/firebase_multi_platform_application
              version: ">= 12.37.0"
            spec:
              outputExpr: web_config.web_app_id
      - name: build
        description: The build configuration for the App Hosting backend
        varType: |-
          object({
              container_image = string
            })
        required: true
    outputs:
      - name: backend_id
        description: The ID of the App Hosting backend
      - name: backend_name
        description: The name of the App Hosting backend
      - name: build_name
        description: The name of the App Hosting build
      - name: project_id
        description: The project ID
      - name: service_account_email
        description: The email of the service account used by the App Hosting backend
  requirements:
    roles:
      - level: Project
        roles:
          - roles/owner
    services:
      - cloudresourcemanager.googleapis.com
      - firebase.googleapis.com
      - firebaseappcheck.googleapis.com
      - identitytoolkit.googleapis.com
      - serviceusage.googleapis.com
      - firebasevertexai.googleapis.com
      - firebaserules.googleapis.com
      - firestore.googleapis.com
      - storage.googleapis.com
      - firebaseapphosting.googleapis.com
      - iam.googleapis.com
      - apikeys.googleapis.com
    providerVersions:
      - source: hashicorp/google
        version: ">= 5.0, < 8.0"
      - source: hashicorp/google-beta
        version: ">= 5.0, < 8.0"
      - source: hashicorp/random
        version: ">= 3.0"
      - source: hashicorp/time
        version: ">= 0.9"
