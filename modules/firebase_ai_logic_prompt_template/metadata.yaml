apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: firebase-firebase-ai-logic-prompt-template
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: Firebase AI Logic Prompt Template Submodule
    source:
      repo: https://github.com/TrCaM/terraform-google-firebase.git
      sourceType: git
      dir: /modules/firebase_ai_logic_prompt_template
    version: 12.36.0
    actuationTool:
      flavor: Terraform
      version: ">= 1.3"
    description: {}
    icon: assets/icon.png
  content:
    examples:
      - name: app_ai_storage
        location: examples/complex_cujs/app_ai_storage
      - name: app_and_appcheck
        location: examples/complex_cujs/app_and_appcheck
      - name: firebase_ai_logic
        location: examples/firebase_ai_logic
      - name: firebase_app_hosting
        location: examples/firebase_app_hosting
      - name: firebase_auth_suite
        location: examples/firebase_auth_suite
      - name: firebase_multi_platform_app
        location: examples/firebase_multi_platform_app
      - name: firestore_rules
        location: examples/firestore_rules
  interfaces:
    variables:
      - name: project_id
        description: The project ID.
        varType: string
        required: true
        connections:
          - source:
              source: github.com/TrCaM/terraform-google-firebase//modules/firebase_ai_logic_core
              version: ">= 12.36.0"
            spec:
              outputExpr: project_id
      - name: location
        description: The location for the prompt template.
        varType: string
        defaultValue: global
        connections:
          - source:
              source: github.com/TrCaM/terraform-google-firebase//modules/firebase_ai_logic_core
              version: ">= 12.36.0"
            spec:
              outputExpr: location
      - name: template_id
        description: The unique identifier for the prompt template.
        varType: string
        required: true
      - name: template_content
        description: Prompt template content. Can either be specified as a raw string or a Google Cloud Storage object
        varType: |-
          object({
              raw = optional(string)
              gcs_object_source = optional(object({
                bucket = string
                name   = string
              }))
            })
        required: true
      - name: enable_lock
        description: Whether to create a production lock for the prompt template.
        varType: bool
        defaultValue: false
    outputs:
      - name: template_id
        description: The template identifier.
        type: string
      - name: template_name
        description: The full resource name of the template.
        type: string
  requirements:
    roles:
      - level: Project
        roles:
          - roles/owner
    services:
      - cloudresourcemanager.googleapis.com
      - firebase.googleapis.com
      - firebaseappcheck.googleapis.com
      - identitytoolkit.googleapis.com
      - serviceusage.googleapis.com
      - firebasevertexai.googleapis.com
      - firebaserules.googleapis.com
      - firestore.googleapis.com
      - storage.googleapis.com
      - firebaseapphosting.googleapis.com
      - iam.googleapis.com
      - apikeys.googleapis.com
    providerVersions:
      - source: hashicorp/google
        version: ">= 5.0, < 8.0"
      - source: hashicorp/google-beta
        version: ">= 7.17.0, < 8.0"
