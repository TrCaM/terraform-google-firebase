apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: firebase-firestore-rules
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: Firestore Rules Submodule
    source:
      repo: https://github.com/TrCaM/terraform-google-firebase.git
      sourceType: git
      dir: /modules/firestore_rules
    version: 12.37.0
    actuationTool:
      flavor: Terraform
      version: ">= 1.3"
    description: {}
    icon: assets/icon.png
  content:
    examples:
      - name: app_ai_storage
        location: examples/complex_cujs/app_ai_storage
      - name: app_and_appcheck
        location: examples/complex_cujs/app_and_appcheck
      - name: firebase_ai_logic
        location: examples/firebase_ai_logic
      - name: firebase_app_hosting
        location: examples/firebase_app_hosting
      - name: firebase_auth_suite
        location: examples/firebase_auth_suite
      - name: firebase_multi_platform_app
        location: examples/firebase_multi_platform_app
      - name: firestore_rules
        location: examples/firestore_rules
  interfaces:
    variables:
      - name: project_id
        description: The ID of the project in which the resource belongs.
        varType: string
        required: true
        connections:
          - source:
              source: github.com/TrCaM/terraform-google-firebase//modules/firebase_multi_platform_application
              version: ">= 12.37.0"
            spec:
              outputExpr: project_id
      - name: database_id
        description: The Firestore database id, use `(default)` for the default database.
        varType: string
        required: true
        connections:
          - source:
              source: github.com/GoogleCloudPlatform/terraform-google-firestore
              version: ">= 0.1.0"
            spec:
              outputExpr: database_id
      - name: rules_content
        description: The security rules to apply.
        varType: string
        defaultValue: |
          rules_version = '2';
          service cloud.firestore {
            match /databases/{database}/documents {
              match /{document=**} {
                allow read, write: if false;
              }
            }
          }
    outputs:
      - name: release_name
        description: The name of the release.
        type: string
      - name: ruleset_name
        description: The name of the ruleset.
        type: string
  requirements:
    roles:
      - level: Project
        roles:
          - roles/owner
    services:
      - cloudresourcemanager.googleapis.com
      - firebase.googleapis.com
      - firebaseappcheck.googleapis.com
      - identitytoolkit.googleapis.com
      - serviceusage.googleapis.com
      - firebasevertexai.googleapis.com
      - firebaserules.googleapis.com
      - firestore.googleapis.com
      - storage.googleapis.com
      - firebaseapphosting.googleapis.com
      - iam.googleapis.com
      - apikeys.googleapis.com
    providerVersions:
      - source: hashicorp/google
        version: ">= 5.0, < 8.0"
      - source: hashicorp/google-beta
        version: ">= 5.0, < 8.0"
